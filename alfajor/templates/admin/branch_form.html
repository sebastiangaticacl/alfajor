{% extends "base.html" %}
{% block title %}{{ 'Editar' if branch else 'Nueva' }} sucursal · ALFAJOR{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Editar' if branch else 'Nueva' }} sucursal</h1>
<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" name="name" class="form-input" value="{{ branch.name if branch else '' }}" required>
    </div>
    <div class="form-group">
      <label>Código</label>
      <input type="text" name="code" class="form-input" value="{{ branch.code if branch else '' }}">
    </div>
    <div class="form-group">
      <label>Dirección</label>
      <input type="text" name="address" class="form-input" value="{{ branch.address if branch else '' }}">
    </div>
    {% if branch %}
    <div class="form-group">
      <label><input type="checkbox" name="active" {{ 'checked' if branch.active else '' }}> Activa</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('settings.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
