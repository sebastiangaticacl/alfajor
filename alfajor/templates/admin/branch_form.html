{% extends "base.html" %}
{% block title %}{{ 'Editar' if branch else 'Nueva' }} sucursal · ALFAJOR{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Editar' if branch else 'Nueva' }} sucursal</h1>
<div class="card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="branch_name">Nombre</label>
      <input type="text" id="branch_name" name="name" class="form-input" value="{{ branch.name if branch else '' }}" required>
    </div>
    <div class="form-group">
      <label for="branch_code">Código</label>
      <input type="text" id="branch_code" name="code" class="form-input" value="{{ branch.code if branch else '' }}">
    </div>
    <div class="form-group">
      <label for="branch_address">Dirección</label>
      <input type="text" id="branch_address" name="address" class="form-input" value="{{ branch.address if branch else '' }}">
    </div>
    {% if branch %}
    <div class="form-group">
      <label for="branch_active"><input type="checkbox" id="branch_active" name="active" {{ 'checked' if branch.active else '' }}> Activa</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('settings.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
