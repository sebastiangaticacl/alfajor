{% extends "base.html" %}
{% block title %}Nueva solicitud · ALFAJOR{% endblock %}

{% block content %}
<h1 class="page-title">Nueva solicitud</h1>
<div class="card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="request_type">Tipo</label>
      <select id="request_type" name="request_type" class="form-input">
        <option value="DIA_LIBRE">Día libre</option>
        <option value="CAMBIO_TURNO">Cambio de turno</option>
        <option value="SWAP">Swap</option>
      </select>
    </div>
    <div class="form-group">
      <label for="requested_date">Fecha solicitada</label>
      <input type="date" id="requested_date" name="requested_date" class="form-input" required>
    </div>
    <div class="form-group">
      <label for="reason">Motivo</label>
      <textarea id="reason" name="reason" class="form-input" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Enviar</button>
      <a href="{{ url_for('requests.list') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
