{% extends "base.html" %}
{% block title %}Nueva solicitud · ALFAJOR{% endblock %}

{% block content %}
<h1 class="page-title">Nueva solicitud</h1>
<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Tipo</label>
      <select name="request_type" class="form-input">
        <option value="DIA_LIBRE">Día libre</option>
        <option value="CAMBIO_TURNO">Cambio de turno</option>
        <option value="SWAP">Swap</option>
      </select>
    </div>
    <div class="form-group">
      <label>Fecha solicitada</label>
      <input type="date" name="requested_date" class="form-input" required>
    </div>
    <div class="form-group">
      <label>Motivo</label>
      <textarea name="reason" class="form-input" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Enviar</button>
      <a href="{{ url_for('requests.list') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
<style>.form-group { margin-bottom: var(--space-4); } .form-actions { margin-top: var(--space-4); display: flex; gap: var(--space-2); }</style>
{% endblock %}
