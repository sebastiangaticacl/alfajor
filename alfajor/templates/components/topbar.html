<header class="topbar" role="banner">
  <div class="topbar-brand">
    <a href="{{ url_for('admin.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="topbar-logo-link">
      <img src="{{ url_for('static', filename='img/logo-cosas-ricas.png') }}" alt="Cosas Ricas" class="topbar-logo-img">
      <span class="topbar-system-name">ALFAJOR</span>
    </a>
    <span class="topbar-subtitle">Sistema de Turnos del Café Cosas Ricas</span>
  </div>
  <nav class="topbar-nav">
    {% if current_user.is_authenticated %}
    <span class="topbar-user">{{ current_user.email }}</span>
    <form action="{{ url_for('auth.logout') }}" method="post" class="topbar-logout">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="btn btn-secondary">Salir</button>
    </form>
    {% else %}
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Entrar</a>
    {% endif %}
  </nav>
</header>
