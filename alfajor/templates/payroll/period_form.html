{% extends "base.html" %}
{% block title %}Nuevo periodo · ALFAJOR{% endblock %}

{% block content %}
<h1 class="page-title">Nuevo periodo de pago</h1>
<div class="card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="period_name">Nombre</label>
      <input type="text" id="period_name" name="name" class="form-input" placeholder="Ej: Semana 1-7 Mar 2026">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="period_start">Inicio</label>
        <input type="date" id="period_start" name="start_date" class="form-input" required>
      </div>
      <div class="form-group">
        <label for="period_end">Fin</label>
        <input type="date" id="period_end" name="end_date" class="form-input" required>
      </div>
    </div>
    <div class="form-group">
      <label for="period_type">Tipo</label>
      <select id="period_type" name="period_type" class="form-input">
        <option value="SEMANAL">Semanal</option>
        <option value="QUINCENAL">Quincenal</option>
        <option value="MENSUAL">Mensual</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Crear</button>
      <a href="{{ url_for('payroll.periods') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
